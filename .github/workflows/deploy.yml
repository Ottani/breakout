name: "Github Pages Deployment"
on:
  push:
    branches: [ main ]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Export Web
        uses: firebelley/godot-export@v5.2.1 
        with:
          godot_executable_download_url: https://downloads.godotengine.org/?version=4.6.2&flavor=stable&slug=linux.x86_64.zip&platform=linux.64
          godot_export_templates_download_url: https://downloads.godotengine.org/?version=4.6.2&flavor=stable&slug=export_templates.tpz&platform=templates
          relative_project_path: ./
          archive_output: false
          cache: true
      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: builds/web/
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4

